			shellPath = /bin/sh;
			shellScript = (
				"# Last step before Xcode seals the app: Hermes/FFmpeg often lack a valid Distribution signature after embed.",
				"# Do NOT set CODE_SIGN_IDENTITY=Apple Distribution in Build Settings with Automatic signing — Xcode flags a conflict.",
				"# Run after Embed Foundation Extensions so PlugIns exist. Debug/simulator: no-op.",
				"set -e",
				"if [ \"${CONFIGURATION}\" != \"Release\" ] || [ \"${PLATFORM_NAME}\" != \"iphoneos\" ]; then exit 0; fi",
				"SIGN_ID=\"${EXPANDED_CODE_SIGN_IDENTITY:-}\"",
				"if [ -z \"$SIGN_ID\" ] || [ \"$SIGN_ID\" = \"-\" ]; then SIGN_ID=\"${CODE_SIGN_IDENTITY:-}\"; fi",
				"if [ -z \"$SIGN_ID\" ] || [ \"$SIGN_ID\" = \"-\" ]; then SIGN_ID=\"Apple Distribution\"; fi",
				"FW_DIR=\"${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}\"",
				"APP=\"${TARGET_BUILD_DIR}/${FULL_PRODUCT_NAME}\"",
				"if [ -d \"$FW_DIR\" ]; then",
				"  for fw in \"$FW_DIR\"/*.framework; do",
				"    if [ -d \"$fw\" ]; then",
				"      echo \"Re-signing (Release) $fw with: $SIGN_ID\"",
				"      /usr/bin/codesign --force --sign \"$SIGN_ID\" --preserve-metadata=identifier,entitlements,flags \"$fw\"",
				"    fi",
				"  done",
				"fi",
				"if [ -d \"$APP/PlugIns\" ]; then",
				"  for appex in \"$APP/PlugIns\"/*.appex; do",
				"    if [ -d \"$appex\" ]; then",
				"      echo \"Re-signing (Release) $appex with: $SIGN_ID\"",
				"      /usr/bin/codesign --force --sign \"$SIGN_ID\" --preserve-metadata=identifier,entitlements,flags \"$appex\"",
